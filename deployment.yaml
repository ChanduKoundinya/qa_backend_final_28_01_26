# --- BACKEND DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: qabot.azurecr.io/backend:v3
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        command: ["/bin/bash", "-c"]
        args: ["gunicorn --bind 0.0.0.0:8000 --timeout 600 --workers 1 --threads 8 run:app"]
        env:
        # POINT TO THE INTERNAL K8S DNS NAME
        - name: CORE_SERVICE_URL
          value: "http://ai-core-service"
        - name: MONGO_USERNAME
          value: "aibots012_db_user"
        - name: MONGO_PASSWORD
          value: "Aibots@12345"
        - name: MONGO_HOSTNAME
          value: "cluster0.5q84faq.mongodb.net"
        - name: DB_NAME
          value: "quality_audit_bot"
---
# --- BACKEND EXTERNAL SERVICE ---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: LoadBalancer # This gives you a PUBLIC IP
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: backend